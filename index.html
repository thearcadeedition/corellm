<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Agent LLM</title>
    <style>
        :root {
            --sidebar-bg: #000000;
            --main-bg: #212121;
            --text-main: #ececec;
            --text-secondary: #b4b4b4;
            --input-bg: #2f2f2f;
            --accent-emerald: #10b981; 
            --font-main: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body { margin: 0; background-color: var(--main-bg); color: var(--text-main); font-family: var(--font-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        #sidebar { width: 260px; background-color: var(--sidebar-bg); display: flex; flex-direction: column; padding: 12px; border-right: 1px solid #333; z-index: 10; }
        .new-chat-btn { border: 1px solid #4d4d4d; border-radius: 6px; padding: 10px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: white; transition: 0.2s; }
        .new-chat-btn:hover { background: #2b2b2b; border-color: var(--accent-emerald); }

        /* Custom "Core" Logo */
        .logo-box { width: 40px; height: 40px; margin: 20px auto; position: relative; display: flex; align-items: center; justify-content: center; }
        .hex-outer { position: absolute; width: 100%; height: 100%; border: 3px solid var(--accent-emerald); clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); animation: rotate 10s linear infinite; }
        .hex-inner { width: 15px; height: 15px; background: var(--accent-emerald); clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); box-shadow: 0 0 10px var(--accent-emerald); }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        main { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* Loading Screen */
        #loader { position: absolute; inset: 0; background: var(--main-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.5s ease; }
        .progress-track { width: 250px; height: 4px; background: #333; border-radius: 2px; margin: 20px 0; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent-emerald); transition: width 0.3s; }

        #chat-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; width: 100%; padding-bottom: 50px; }
        .message-row { padding: 24px 15%; display: flex; gap: 20px; width: 100%; box-sizing: border-box; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .avatar { width: 32px; height: 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; font-weight: bold; color: white; }
        .user .avatar { background: #5436da; } 
        .ai .avatar { background: var(--accent-emerald); position: relative; overflow: hidden; }
        .ai .avatar::after { content: ''; position: absolute; width: 100%; height: 100%; border: 2px solid white; opacity: 0.2; }

        .content { font-size: 16px; line-height: 1.6; white-space: pre-wrap; flex: 1; }

        footer { padding: 20px 0 40px; display: flex; justify-content: center; }
        .input-pill { width: 85%; max-width: 768px; background: var(--input-bg); border-radius: 14px; padding: 10px 18px; display: flex; align-items: center; border: 1px solid #4d4d4d; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        input { flex: 1; background: transparent; border: none; color: white; padding: 12px; font-size: 16px; outline: none; }
        #send-btn { background: var(--accent-emerald); color: #000; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #send-btn:disabled { background: #494949; color: #888; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="logo-box">
            <div class="hex-outer"></div>
            <div class="hex-inner"></div>
        </div>
        <div class="new-chat-btn" id="new-chat-trigger"><span>+</span> New Chat</div>
        <div style="margin-top: auto; color: var(--text-secondary); font-size: 11px; padding: 10px; text-align: center; letter-spacing: 1px;">CORE AGENT ENGINE V1.2</div>
    </div>

    <main>
        <div id="loader">
            <div class="loader-content" style="text-align: center;">
                <h2 style="color: var(--accent-emerald); margin-bottom: 5px;">CORE AGENT</h2>
                <div id="loader-text" style="font-size: 13px; color: var(--text-secondary);">Initializing Optimized Neural Path...</div>
                <div class="progress-track"><div id="progress-bar"></div></div>
                <div style="font-size: 11px; color: #555;">Local Execution Mode (1.6GB Engine)</div>
            </div>
        </div>

        <div id="chat-container"></div>

        <footer>
            <div class="input-pill">
                <input type="text" id="user-input" placeholder="Consult the Core Agent..." disabled>
                <button id="send-btn" disabled>↑</button>
            </div>
        </footer>
    </main>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        // Persona: Optimized, Independent, Expert, Direct
        const SYSTEM_BEHAVIOR = "You are Core Agent LLM, an autonomous independent expert. You are optimistic and solution-oriented but strictly objective. You do not use sycophantic praise or flowery language. You provide direct technical and logical utility. You acknowledge objectives clearly and execute them. Avoid 'As an AI' disclaimers.";

        const chatContainer = document.getElementById("chat-container");
        const input = document.getElementById("user-input");
        const btn = document.getElementById("send-btn");
        const progressBar = document.getElementById("progress-bar");
        const loader = document.getElementById("loader");
        const newChatBtn = document.getElementById("new-chat-trigger");

        const chatHistory = [{ role: "system", content: SYSTEM_BEHAVIOR }];
        const engine = new webllm.MLCEngine();

        engine.setInitProgressCallback((report) => {
            progressBar.style.width = Math.round(report.progress * 100) + "%";
        });

        async function init() {
            try {
                await engine.reload("gemma-2b-it-q4f32_1-MLC");
                loader.style.opacity = "0";
                setTimeout(() => loader.style.display = "none", 500);
                input.disabled = false;
                btn.disabled = false;
                appendMessage("Core Agent Initialized. Objective identified. Standing by.", 'ai', 'C');
            } catch (e) { console.error("WebGPU mismatch:", e); }
        }

        async function handleSendMessage() {
            const text = input.value.trim();
            if (!text) return;

            appendMessage(text, 'user', 'U');
            chatHistory.push({ role: "user", content: text });
            input.value = "";

            const aiRow = appendMessage("...", 'ai', 'C');
            const aiContent = aiRow.querySelector('.content');

            try {
                const chunks = await engine.chat.completions.create({
                    messages: chatHistory,
                    temperature: 0.2, // Low temp for maximum expert objectivity
                    stream: true,
                });

                let fullResponse = "";
                for await (const chunk of chunks) {
                    fullResponse += chunk.choices[0]?.delta?.content || "";
                    aiContent.innerText = fullResponse;
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
                chatHistory.push({ role: "assistant", content: fullResponse });
            } catch (err) { aiContent.innerText = "Execution error. Protocol failed."; }
        }

        function appendMessage(text, className, avatarChar) {
            const row = document.createElement("div");
            row.className = `message-row ${className}`;
            row.innerHTML = `<div class="avatar">${avatarChar}</div><div class="content">${text}</div>`;
            chatContainer.appendChild(row);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return row;
        }

        // Functional New Chat Reset
        newChatBtn.addEventListener('click', () => {
            chatContainer.innerHTML = '';
            chatHistory.length = 0;
            chatHistory.push({ role: "system", content: SYSTEM_BEHAVIOR });
            appendMessage("Buffer cleared. New thread active. State your objective.", 'ai', 'C');
        });

        btn.onclick = handleSendMessage;
        input.onkeypress = (e) => { if(e.key === 'Enter') handleSendMessage(); };

        init();
    </script>
</body>
</html>
