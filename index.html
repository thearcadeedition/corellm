<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect AI</title>
    <style>
        :root {
            --sidebar-bg: #000000;
            --main-bg: #212121;
            --text-main: #ececec;
            --text-secondary: #b4b4b4;
            --input-bg: #2f2f2f;
            --accent-green: #10a37f; /* The iconic ChatGPT green */
            --font-main: 'Sentry', 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            margin: 0; background-color: var(--main-bg); color: var(--text-main);
            font-family: var(--font-main); display: flex; height: 100vh;
        }

        /* Sidebar - ChatGPT Style */
        #sidebar {
            width: 260px; background-color: var(--sidebar-bg);
            display: flex; flex-direction: column; padding: 12px;
            box-sizing: border-box; border-right: 1px solid #333;
        }
        .new-chat-btn {
            border: 1px solid #4d4d4d; border-radius: 6px; padding: 10px;
            font-size: 14px; cursor: pointer; display: flex; align-items: center;
            gap: 10px; transition: 0.2s; color: white;
        }
        .new-chat-btn:hover { background: #2b2b2b; }

        /* Main Chat Area */
        main {
            flex: 1; display: flex; flex-direction: column; position: relative;
        }

        /* Loading Overlay */
        #loader {
            position: absolute; inset: 0; background: var(--main-bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; transition: opacity 0.5s;
        }
        .loader-content { width: 300px; text-align: center; }
        .progress-track { width: 100%; height: 4px; background: #333; border-radius: 2px; margin: 20px 0; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent-green); transition: width 0.3s; }

        #chat-container {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; width: 100%;
        }

        /* Message Bubbles */
        .message-row {
            padding: 24px 10%; display: flex; gap: 20px; width: 100%; box-sizing: border-box;
        }
        .message-row.ai { background-color: #212121; }
        .message-row.user { background-color: #212121; }

        .avatar {
            width: 30px; height: 30px; border-radius: 2px; display: flex;
            align-items: center; justify-content: center; flex-shrink: 0;
            font-size: 12px; font-weight: bold;
        }
        .user .avatar { background: #5436da; content: "U"; }
        .ai .avatar { background: var(--accent-green); content: "P"; }

        .content {
            font-size: 16px; line-height: 1.6; white-space: pre-wrap; flex: 1;
        }

        /* Input Pill Box */
        footer {
            padding: 20px 0 40px; display: flex; justify-content: center; background: transparent;
        }
        .input-pill {
            width: 80%; max-width: 768px; background: var(--input-bg);
            border-radius: 12px; padding: 10px 15px; display: flex;
            align-items: center; border: 1px solid #4d4d4d;
        }
        input {
            flex: 1; background: transparent; border: none; color: white;
            padding: 10px; font-size: 16px; outline: none;
        }
        #send-btn {
            background: var(--accent-green); color: white; border: none;
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold;
        }
        #send-btn:disabled { background: #494949; cursor: not-allowed; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="new-chat-btn"><span>+</span> New Chat</div>
        <div style="margin-top: auto; color: #8e8e93; font-size: 12px; padding: 10px;">Perfect AI v1.0</div>
    </div>

    <main>
        <div id="loader">
            <div class="loader-content">
                <div style="font-size: 24px; margin-bottom: 10px;">Perfect AI</div>
                <div class="progress-track"><div id="progress-bar"></div></div>
                <div id="loader-text" style="font-size: 14px; color: var(--text-secondary);">Downloading Local Neural Network (1.6GB)</div>
            </div>
        </div>

        <div id="chat-container">
            </div>

        <footer>
            <div class="input-pill">
                <input type="text" id="user-input" placeholder="Message Perfect AI..." disabled>
                <button id="send-btn" disabled>↑</button>
            </div>
        </footer>
    </main>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const SYSTEM_BEHAVIOR = "You are Perfect AI, an expert collaborator. Your intelligence is vast but your ego is non-existent. You are kind, helpful, and composed. You never use sarcasm or wit. Your goal is to be the most useful and grounded presence in the user's digital life. Speak directly and sincerely.";

        const chatContainer = document.getElementById("chat-container");
        const input = document.getElementById("user-input");
        const btn = document.getElementById("send-btn");
        const progressBar = document.getElementById("progress-bar");
        const loader = document.getElementById("loader");

        const chatHistory = [{ role: "system", content: SYSTEM_BEHAVIOR }];
        const engine = new webllm.MLCEngine();

        engine.setInitProgressCallback((report) => {
            const p = Math.round(report.progress * 100);
            progressBar.style.width = p + "%";
        });

        async function init() {
            try {
                await engine.reload("gemma-2b-it-q4f32_1-MLC");
                loader.style.opacity = "0";
                setTimeout(() => loader.style.display = "none", 500);
                input.disabled = false;
                btn.disabled = false;
                
                // Initial AI Greeting
                appendMessage("I have initialized my local engine. How can I assist you today?", 'ai', 'P');
            } catch (e) {
                console.error(e);
            }
        }

        async function handleSendMessage() {
            const text = input.value.trim();
            if (!text) return;

            appendMessage(text, 'user', 'U');
            chatHistory.push({ role: "user", content: text });
            input.value = "";

            const aiRow = appendMessage("...", 'ai', 'P');
            const aiContent = aiRow.querySelector('.content');

            try {
                const chunks = await engine.chat.completions.create({
                    messages: chatHistory,
                    temperature: 0.4,
                    stream: true,
                });

                let fullResponse = "";
                for await (const chunk of chunks) {
                    fullResponse += chunk.choices[0]?.delta?.content || "";
                    aiContent.innerText = fullResponse;
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
                chatHistory.push({ role: "assistant", content: fullResponse });
            } catch (err) {
                aiContent.innerText = "Error: Check your connection or WebGPU support.";
            }
        }

        function appendMessage(text, className, avatarChar) {
            const row = document.createElement("div");
            row.className = `message-row ${className}`;
            row.innerHTML = `
                <div class="avatar">${avatarChar}</div>
                <div class="content">${text}</div>
            `;
            chatContainer.appendChild(row);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return row;
        }

        btn.onclick = handleSendMessage;
        input.onkeypress = (e) => { if(e.key === 'Enter') handleSendMessage(); };

        init();
    </script>
</body>
</html>
