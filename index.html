<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const status = document.getElementById("status");
    const btn = document.getElementById("send-btn");
    const input = document.getElementById("user-input");
    const chatBox = document.getElementById("chat-box");

    // This model is much better at talking like a human
    const selectedModel = "gemma-2b-it-q4f32_1-MLC"; 

    const engine = new webllm.MLCEngine();

    // The "Personality" - This makes it act natural
    const chatHistory = [
        { role: "system", content: "You are a helpful, natural-sounding AI assistant. Give concise, friendly answers." }
    ];

    engine.setInitProgressCallback((report) => {
        status.innerText = report.text;
    });

    async function init() {
        try {
            await engine.reload(selectedModel);
            input.disabled = false;
            btn.disabled = false;
            status.innerText = "System: Online & Ready";
        } catch (e) {
            status.innerText = "WebGPU not supported or error loading.";
        }
    }

    async function send() {
        const text = input.value;
        if (!text) return;
        
        appendMsg(text, 'user');
        chatHistory.push({ role: "user", content: text }); // Add to memory
        input.value = "";
        
        const aiMsgDiv = appendMsg("...", 'ai');
        
        const chunks = await engine.chat.completions.create({
            messages: chatHistory, 
            temperature: 0.7, // Lower = more focused, Higher = more creative
            stream: true,
        });

        let reply = "";
        for await (const chunk of chunks) {
            const content = chunk.choices[0]?.delta?.content || "";
            reply += content;
            aiMsgDiv.innerText = reply;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        chatHistory.push({ role: "assistant", content: reply }); // AI remembers its own reply
    }

    function appendMsg(text, role) {
        const div = document.createElement("div");
        div.className = `msg ${role}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return div;
    }

    btn.onclick = send;
    input.onkeypress = (e) => { if(e.key === 'Enter') send(); };

    init();
</script>
