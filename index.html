<!DOCTYPE html>
<html>
<head>
    <title>Unblocked Chat AI</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; background: #1a1a1a; color: white; display: flex; flex-direction: column; height: 100vh; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.4; }
        .user { align-self: flex-end; background: #007bff; }
        .ai { align-self: flex-start; background: #333; border: 1px solid #444; }
        #controls { padding: 20px; background: #222; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #333; color: white; outline: none; }
        button { padding: 10px 20px; border-radius: 8px; border: none; background: #00d1b2; color: white; font-weight: bold; cursor: pointer; }
        #status { font-size: 12px; color: #888; padding: 5px 20px; }
    </style>
</head>
<body>
    <div id="status">System: Waiting to initialize...</div>
    <div id="chat-box">
        <div class="msg ai">Hello! I am a fully local AI. The first time we chat, I need to download my "brain" (about 1.5GB). After that, I work offline. Ready?</div>
    </div>
    <div id="controls">
        <input type="text" id="user-input" placeholder="Say something..." disabled>
        <button id="send-btn" disabled>Send</button>
    </div>

    <script type="module">
        // Using WebLLM from the CDN
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const status = document.getElementById("status");
        const btn = document.getElementById("send-btn");
        const input = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");

        // We use a small model so it doesn't crash a school laptop
        const selectedModel = "TinyLlama-1.1B-Chat-v1.0-q4f32_1-MLC";

        const engine = new webllm.MLCEngine();

        engine.setInitProgressCallback((report) => {
            status.innerText = report.text;
        });

        async function init() {
            try {
                await engine.reload(selectedModel);
                input.disabled = false;
                btn.disabled = false;
                status.innerText = "System: Online (Local)";
            } catch (e) {
                status.innerText = "Error: Your browser might not support WebGPU.";
                console.error(e);
            }
        }

        async function send() {
            const text = input.value;
            if (!text) return;
            
            appendMsg(text, 'user');
            input.value = "";
            
            const aiMsgDiv = appendMsg("...", 'ai');
            
            const chunks = await engine.chat.completions.create({
                messages: [{ role: "user", content: text }],
                stream: true,
            });

            let reply = "";
            for await (const chunk of chunks) {
                const content = chunk.choices[0]?.delta?.content || "";
                reply += content;
                aiMsgDiv.innerText = reply;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        function appendMsg(text, role) {
            const div = document.createElement("div");
            div.className = `msg ${role}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        btn.onclick = send;
        input.onkeypress = (e) => { if(e.key === 'Enter') send(); };

        init();
    </script>
</body>
</html>
